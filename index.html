<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGBTAI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#202123;
height:100vh;
display:flex;
flex-direction:column;
color:white;
}

header{
background:#343541;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
border-bottom:2px solid #444;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:80%;
padding:12px;
margin:10px 0;
border-radius:15px;
line-height:1.5;
}

.user{
background:#19c37d;
margin-left:auto;
color:white;
}

.bot{
background:#444654;
margin-right:auto;
}

.input-area{
display:flex;
padding:15px;
background:#343541;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-left:10px;
padding:15px 25px;
background:#19c37d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}
</style>
</head>
<body>

<header>
Chào mừng đến với LGBTAI
</header>

<div id="chat">

<div class="message bot">
Xin chào! Tôi là LGBTAI. Hãy hỏi tôi bất cứ điều gì.
</div>

</div>

<div class="input-area">
<input id="question" placeholder="Nhập câu hỏi...">
<button onclick="sendMessage()">Gửi</button>
</div>

<script>

const answers = {

"xin chào":"Xin chào! Rất vui được gặp bạn.",
"bạn tên gì":"Tôi là LGBTAI.",
"ai tạo ra bạn":"Tôi được tạo ra bởi đội phát triển LGBTAI.",
"mấy giờ rồi":"Tôi chưa xem được đồng hồ của thiết bị.",
"hôm nay là ngày gì":"Bạn có thể xem trên thiết bị của mình.",
"2+2":"2 + 2 = 4.",
"việt nam ở đâu":"Việt Nam nằm ở Đông Nam Á.",
"thủ đô việt nam":"Thủ đô Việt Nam là Hà Nội.",
"tổng thống mỹ":"Thông tin này có thể thay đổi theo thời gian.",
"trái đất hình gì":"Trái Đất gần giống hình cầu.",
"mặt trời là gì":"Mặt Trời là một ngôi sao.",
"1 năm có bao nhiêu ngày":"Thông thường có 365 ngày.",
"nước sôi ở bao nhiêu độ":"100°C ở áp suất tiêu chuẩn.",
"ai phát minh bóng đèn":"Thomas Edison nổi tiếng với việc cải tiến bóng đèn.",
"html là gì":"HTML là ngôn ngữ đánh dấu siêu văn bản.",
"css là gì":"CSS dùng để thiết kế giao diện web.",
"javascript là gì":"JavaScript là ngôn ngữ lập trình web.",
"github là gì":"GitHub là nền tảng lưu trữ mã nguồn.",
"game là gì":"Game là một hình thức giải trí tương tác.",
"bóng đá là gì":"Bóng đá là môn thể thao phổ biến nhất thế giới.",
"bao nhiêu hành tinh":"Hiện có 8 hành tinh trong Hệ Mặt Trời.",
"python là gì":"Python là ngôn ngữ lập trình phổ biến.",
"java là gì":"Java là ngôn ngữ lập trình hướng đối tượng.",
"c++ là gì":"C++ là ngôn ngữ lập trình hiệu năng cao.",
"máy tính là gì":"Máy tính là thiết bị xử lý thông tin.",
"internet là gì":"Internet là mạng lưới kết nối toàn cầu.",
"wifi là gì":"Wi-Fi cho phép kết nối mạng không dây.",
"cpu là gì":"CPU là bộ xử lý trung tâm.",
"ram là gì":"RAM là bộ nhớ tạm thời.",
"ssd là gì":"SSD là ổ lưu trữ tốc độ cao.",
"trường học là gì":"Nơi học tập và giáo dục.",
"học toán thế nào":"Luyện tập thường xuyên và hiểu bản chất.",
"học văn thế nào":"Đọc nhiều và luyện viết thường xuyên.",
"học tiếng anh thế nào":"Luyện nghe, nói, đọc, viết mỗi ngày.",
"chatgpt là gì":"Một trợ lý AI hội thoại.",
"bạn có thông minh không":"Tôi cố gắng trả lời tốt nhất có thể.",
"bạn có cảm xúc không":"Tôi không có cảm xúc như con người.",
"bạn thích gì":"Tôi thích giúp đỡ người dùng.",
"tạm biệt":"Hẹn gặp lại bạn!",
"cảm ơn":"Không có gì, rất vui được giúp bạn!"
};

function addMessage(text,type){
const div=document.createElement("div");
div.className="message "+type;
div.innerText=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;
}

function sendMessage(){

const input=document.getElementById("question");
const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

setTimeout(()=>{

let response=
"Tôi chưa có dữ liệu cho câu hỏi này.";

for(let key in answers){

if(text.toLowerCase().includes(key)){
response=answers[key];
break;
}

}

addMessage(response,"bot");

},500);

}

document.getElementById("question")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
