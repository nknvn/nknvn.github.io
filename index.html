```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini Adventure V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
    background:linear-gradient(#6ec6ff,#ffffff);
}

#menu{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.9);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;
}

#menu h1{
    font-size:52px;
    margin-bottom:20px;
    text-align:center;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:14px;
    font-size:22px;
    cursor:pointer;
    margin-top:15px;
    background:#00c853;
    color:white;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    color:white;
    font-size:20px;
    text-shadow:2px 2px 4px black;
}

#achievement{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    background:gold;
    color:black;
    padding:14px 25px;
    border-radius:12px;
    font-weight:bold;
    display:none;
    z-index:50;
}

#mobileControls{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    z-index:30;
}

.controlGroup{
    display:flex;
    gap:15px;
}

.controlBtn{
    width:75px;
    height:75px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    color:white;
    font-size:30px;
    backdrop-filter:blur(6px);
}

#pauseScreen{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:50px;
    z-index:40;
}
</style>
</head>
<body>

<div id="menu">
    <h1>⚔ MINI ADVENTURE V2 ⚔</h1>
    <button class="btn" onclick="startGame()">START GAME</button>
</div>

<div id="hud">
    ❤️ HP: <span id="hpText">5</span><br>
    ⭐ Level: <span id="levelText">1</span><br>
    🪙 Coins: <span id="coinText">0</span>
</div>

<div id="achievement"></div>

<div id="pauseScreen">⏸ PAUSED</div>

<canvas id="game"></canvas>

<div id="mobileControls">

    <div class="controlGroup">
        <button class="controlBtn" id="leftBtn">◀</button>
        <button class="controlBtn" id="rightBtn">▶</button>
    </div>

    <div class="controlGroup">
        <button class="controlBtn" id="jumpBtn">⬆</button>
        <button class="controlBtn" id="dashBtn">⚡</button>
    </div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let gameStarted = false;
let paused = false;

const keys = {};

const player = {
    x:100,
    y:200,
    w:50,
    h:50,
    color:"red",
    vx:0,
    vy:0,
    speed:6,
    jump:17,
    grounded:false,
    hp:5,
    dashPower:16,
    canDoubleJump:true
};

let gravity = 0.85;
let cameraX = 0;
let coinCount = 0;
let currentLevel = 1;

let particles = [];
let enemies = [];
let coins = [];
let platforms = [];

const levels = [
{
    width:2200,
    bg:"#6ec6ff",
    platforms:[
        {x:0,y:650,w:2200,h:50},
        {x:350,y:500,w:250,h:20},
        {x:750,y:400,w:250,h:20},
        {x:1200,y:300,w:250,h:20},
        {x:1650,y:450,w:250,h:20},
    ],
    coins:[
        {x:450,y:450},
        {x:850,y:350},
        {x:1300,y:250},
        {x:1750,y:400}
    ],
    enemies:[
        {x:900,y:600,w:50,h:50,dir:1},
        {x:1500,y:600,w:50,h:50,dir:-1}
    ]
},
{
    width:2800,
    bg:"#ff7043",
    platforms:[
        {x:0,y:650,w:2800,h:50},
        {x:250,y:520,w:180,h:20},
        {x:650,y:420,w:180,h:20},
        {x:1050,y:320,w:180,h:20},
        {x:1450,y:220,w:180,h:20},
        {x:1950,y:350,w:180,h:20},
        {x:2350,y:250,w:180,h:20},
    ],
    coins:[
        {x:300,y:470},
        {x:700,y:370},
        {x:1100,y:270},
        {x:1500,y:170},
        {x:2400,y:200}
    ],
    enemies:[
        {x:500,y:600,w:50,h:50,dir:1},
        {x:1300,y:600,w:50,h:50,dir:-1},
        {x:2100,y:600,w:50,h:50,dir:1}
    ]
}
];

function loadLevel(index){

    const lvl = levels[index-1];

    platforms = lvl.platforms;

    coins = lvl.coins.map(c=>({
        x:c.x,
        y:c.y,
        r:14,
        collected:false
    }));

    enemies = lvl.enemies.map(e=>(...e));

    player.x = 100;
    player.y = 200;
    player.vx = 0;
    player.vy = 0;

    document.body.style.background = lvl.bg;

    document.getElementById("levelText").innerText = currentLevel;
}

function startGame(){

    document.getElementById("menu").style.display = "none";

    gameStarted = true;

    loadLevel(currentLevel);

    gameLoop();
}

function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x-cameraX, player.y, player.w, player.h);
}

function drawPlatforms(){
    ctx.fillStyle = "#333";

    platforms.forEach(p=>{
        ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
    });
}

function drawCoins(){
    coins.forEach(c=>{
        if(!c.collected){
            ctx.beginPath();
            ctx.fillStyle = "gold";
            ctx.arc(c.x-cameraX,c.y,c.r,0,Math.PI*2);
            ctx.fill();
        }
    });
}

function drawEnemies(){
    enemies.forEach(e=>{
        ctx.fillStyle = "purple";
        ctx.fillRect(e.x-cameraX,e.y,e.w,e.h);
    });
}

function createParticles(x,y,color){

    for(let i=0;i<12;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*8,
            vy:(Math.random()-0.5)*8,
            life:30,
            color
        });
    }
}

function updateParticles(){

    particles.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
    });

    particles = particles.filter(p=>p.life>0);
}

function drawParticles(){

    particles.forEach(p=>{
        ctx.globalAlpha = p.life/30;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x-cameraX,p.y,6,6);
    });

    ctx.globalAlpha = 1;
}

function update(){

    if(paused) return;

    player.vx = 0;

    if(keys["ArrowLeft"]){
        player.vx = -player.speed;
    }

    if(keys["ArrowRight"]){
        player.vx = player.speed;
    }

    player.x += player.vx;

    player.vy += gravity;
    player.y += player.vy;

    player.grounded = false;

    platforms.forEach(p=>{

        if(
            player.x < p.x+p.w &&
            player.x+player.w > p.x &&
            player.y < p.y+p.h &&
            player.y+player.h > p.y
        ){
            if(player.vy > 0){
                player.y = p.y-player.h;
                player.vy = 0;
                player.grounded = true;
                player.canDoubleJump = true;
            }
        }
    });

    coins.forEach(c=>{

        if(!c.collected){

            let dx = player.x+player.w/2-c.x;
            let dy = player.y+player.h/2-c.y;

            if(Math.sqrt(dx*dx+dy*dy)<45){
                c.collected = true;
                coinCount++;
                createParticles(c.x,c.y,"yellow");
                document.getElementById("coinText").innerText = coinCount;

                if(coinCount === 1){
                    achievement("🏆 Coin đầu tiên!");
                }
            }
        }
    });

    enemies.forEach(e=>{

        e.x += 2*e.dir;

        if(e.x < 0 || e.x > levels[currentLevel-1].width-60){
            e.dir *= -1;
        }

        if(
            player.x < e.x+e.w &&
            player.x+player.w > e.x &&
            player.y < e.y+e.h &&
            player.y+player.h > e.y
        ){
            player.hp--;
            createParticles(player.x,player.y,"red");
            document.getElementById("hpText").innerText = player.hp;
            player.x = 100;
            player.y = 100;

            if(player.hp <= 0){
                gameOver();
            }
        }
    });

    cameraX = player.x - canvas.width/3;

    if(cameraX < 0) cameraX = 0;

    if(player.y > canvas.height+300){
        player.hp--;
        document.getElementById("hpText").innerText = player.hp;

        player.x = 100;
        player.y = 100;

        if(player.hp <= 0){
            gameOver();
        }
    }

    if(coins.every(c=>c.collected)){

        if(currentLevel < levels.length){
            currentLevel++;
            achievement("🎉 Qua màn!");
            loadLevel(currentLevel);
        }else{
            achievement("👑 HOÀN THÀNH GAME!");
        }
    }

    updateParticles();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlatforms();
    drawCoins();
    drawEnemies();
    drawPlayer();
    drawParticles();
}

function gameLoop(){

    if(!gameStarted) return;

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

function achievement(text){

    const box = document.getElementById("achievement");

    box.innerText = text;
    box.style.display = "block";

    setTimeout(()=>{
        box.style.display = "none";
    },2500);
}

function gameOver(){

    gameStarted = false;

    document.getElementById("menu").style.display = "flex";
    document.querySelector("#menu h1").innerText = "💀 GAME OVER";

    currentLevel = 1;
    coinCount = 0;

    player.hp = 5;

    document.getElementById("hpText").innerText = player.hp;
    document.getElementById("coinText").innerText = coinCount;
}

window.addEventListener("keydown", e=>{

    keys[e.key] = true;

    if((e.key === "ArrowUp" || e.key === " ")){

        if(player.grounded){
            player.vy = -player.jump;
        }
        else if(player.canDoubleJump){
            player.vy = -player.jump;
            player.canDoubleJump = false;
            createParticles(player.x,player.y,"cyan");
        }
    }

    if(e.key.toLowerCase() === "x"){
        dash();
    }

    if(e.key.toLowerCase() === "p"){
        togglePause();
    }
});

window.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function dash(){

    if(keys["ArrowRight"]){
        player.x += player.dashPower*10;
    }

    if(keys["ArrowLeft"]){
        player.x -= player.dashPower*10;
    }

    createParticles(player.x,player.y,"white");
}

function togglePause(){

    paused = !paused;

    document.getElementById("pauseScreen").style.display = paused ? "flex" : "none";
}

function mobileHold(btn,key){

    btn.addEventListener("touchstart",e=>{
        e.preventDefault();
        keys[key] = true;
    });

    btn.addEventListener("touchend",e=>{
        e.preventDefault();
        keys[key] = false;
    });
}

mobileHold(document.getElementById("leftBtn"),"ArrowLeft");
mobileHold(document.getElementById("rightBtn"),"ArrowRight");


document.getElementById("jumpBtn").addEventListener("touchstart",e=>{

    e.preventDefault();

    if(player.grounded){
        player.vy = -player.jump;
    }
    else if(player.canDoubleJump){
        player.vy = -player.jump;
        player.canDoubleJump = false;
    }
});


document.getElementById("dashBtn").addEventListener("touchstart",e=>{
    e.preventDefault();
    dash();
});

</script>
</body>
</html>
```
