<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGBTAI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#202123;
height:100vh;
display:flex;
flex-direction:column;
color:white;
transition:0.5s;
}

header{
background:#343541;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
border-bottom:2px solid #444;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:80%;
padding:12px;
margin:10px 0;
border-radius:15px;
line-height:1.5;
word-wrap:break-word;
}

.user{
background:#19c37d;
margin-left:auto;
}

.bot{
background:#444654;
margin-right:auto;
}

.input-area{
display:flex;
padding:15px;
background:#343541;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
margin-left:10px;
padding:15px 25px;
background:#19c37d;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

/* CẦU VỒNG */

.rainbow-mode{
background:linear-gradient(
45deg,
red,
orange,
yellow,
green,
cyan,
blue,
purple,
red
);
background-size:400% 400%;
animation:rainbowBG 6s linear infinite;
}

@keyframes rainbowBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.rainbow-title{
animation:rainbowText 2s linear infinite;
}

@keyframes rainbowText{
0%{color:red;}
15%{color:orange;}
30%{color:yellow;}
45%{color:lime;}
60%{color:cyan;}
75%{color:blue;}
100%{color:violet;}
}
</style>

</head>
<body>

<header id="title">
Chào mừng đến với LGBTAI
</header>

<div id="chat">

<div class="message bot">
👋 Xin chào! Tôi là LGBTAI.

Hãy thử hỏi tôi những câu cơ bản hoặc nhập:

<b>anh khôi đẹp zai</b>

để mở bí mật 🌈
</div>

</div>

<div class="input-area">
<input id="question" placeholder="Nhập câu hỏi...">
<button onclick="sendMessage()">Gửi</button>
</div>

<script>

"con vịt kêu gì":"🦆 Quạc.",

"tôi có ngáo không":"🗿 Câu hỏi này tự trả lời rồi.",
"bạn yêu tôi không":"❤️ Tôi quý mọi người như nhau.",
"đi ngủ thôi":"🌙 Chúc ngủ ngon, đừng để ma WiFi bắt nhé.",
"có ma không":"👻 Nếu có thì chắc họ cũng đang dùng WiFi.",
"game nào hay":"🎮 Game chưa lag là game hay.",
"tôi học giỏi không":"📖 Kết quả kiểm tra sẽ trả lời thay tôi.",
"bạn là ai":"🤖 Tôi là LGBTAI, chuyên trả lời linh tinh một cách nghiêm túc."
};

function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=text;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

}

function sendMessage(){

const input=document.getElementById("question");

const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

/* BÍ MẬT CẦU VỒNG */

if(text.toLowerCase()==="anh khôi đẹp zai"){

document.body.classList.add("rainbow-mode");

document.getElementById("title")
.classList.add("rainbow-title");

setTimeout(()=>{
addMessage(
"🌈 CHẾ ĐỘ ANH KHÔI ĐẸP ZAI ĐÃ KÍCH HOẠT 🌈",
"bot"
);
},300);

return;
}

setTimeout(()=>{

let response=
"hỏi đéo gì ngu vậy, hỏi lại đi";

for(let key in answers){

if(text.toLowerCase().includes(key)){

response=answers[key];

break;

}

}

addMessage(response,"bot");

},500);

}

document
.getElementById("question")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

</script>

</body>
</html>
