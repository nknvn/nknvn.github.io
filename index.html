function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=text;

document.getElementById("chat").appendChild(div);

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

}

function sendMessage(){

const input=document.getElementById("question");

const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

/* BÍ MẬT CẦU VỒNG */

if(text.toLowerCase()==="anh khôi đẹp zai"){

document.body.classList.add("rainbow-mode");

document.getElementById("title")
.classList.add("rainbow-title");

setTimeout(()=>{
addMessage(
"🌈 CHẾ ĐỘ ANH KHÔI ĐẸP ZAI ĐÃ KÍCH HOẠT 🌈",
"bot"
);
},300);

return;
}

setTimeout(()=>{

let response=
"hỏi đéo gì ngu vậy, hỏi lại đi";

for(let key in answers){

if(text.toLowerCase().includes(key)){

response=answers[key];

break;

}

}

addMessage(response,"bot");

},500);

}

document
.getElementById("question")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

    const password = document.getElementById("khoi-password").value.trim().toLowerCase();
    const error = document.getElementById("khoi-error");

    if (password === "khôi" || password === "khoi") {
      document.getElementById("khoi-lock").style.display = "none";
      document.getElementById("khoi-chat-page").style.display = "block";
      document.getElementById("khoi-input").focus();
    } else {
      error.textContent = "Mật mã chưa đúng.";
    }
  }

  function khoiAddMessage(text, type) {
    const messages = document.getElementById("khoi-messages");
    const msg = document.createElement("div");

    msg.className = "khoi-msg " + (type === "user" ? "khoi-user" : "khoi-bot");
    msg.textContent = text;

    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function khoiSendMessage() {
    const input = document.getElementById("khoi-input");
    const text = input.value.trim();

    if (text === "") return;

    khoiAddMessage(text, "user");
    input.value = "";

    setTimeout(function () {
      khoiAddMessage(khoiBotReply(text), "bot");
    }, 300);
  }

  });

  document.getElementById("khoi-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      khoiSendMessage();
    }
  });
</script>
